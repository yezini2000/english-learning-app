services:
  - type: web
    name: english-learning-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: PORT
        value: "3000"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: NODE_ENV
        value: production
